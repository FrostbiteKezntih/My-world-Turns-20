<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happiest Birthday To My Loveliest Chummish 💗</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Dancing+Script:wght@600;700&family=Great+Vibes&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --baby-pink: #FFD1DC;
            --pink-glow: #ffb6c1;
            --paper-bg: #f4e8d3; 
            --ink-color: #3b2f2f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--baby-pink);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            position: fixed; /* Prevents bounce and scroll shifts on mobile devices */
        }

        /* --- Transitions & Dynamic Viewport Layout --- */
        .section {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease-in-out, visibility 0.6s;
            opacity: 0;
            visibility: hidden;
            text-align: center;
            z-index: 1; 
            pointer-events: none;
            padding: 15px;
        }

        .active {
            opacity: 1;
            visibility: visible;
            z-index: 10; 
            pointer-events: auto;
        }

        /* --- PART 1: LOCK SCREEN --- */
        .pin-display {
            font-size: 2.5rem;
            letter-spacing: 8px;
            color: #d63384;
            margin-bottom: 15px;
            min-height: 50px;
            font-weight: bold;
        }

        .hint {
            color: #d63384;
            font-style: italic;
            margin-bottom: 30px;
            font-size: 1.1rem;
            max-width: 90%;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 75px);
            justify-content: center;
            gap: 20px; 
        }

        .heart-btn {
            position: relative;
            width: 75px;
            height: 75px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }

        .heart-btn::before,
        .heart-btn::after {
            content: "";
            position: absolute;
            top: 0;
            width: 37px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 50px 50px 0 0;
            box-shadow: 0 0 10px var(--pink-glow);
            z-index: 1;
        }

        .heart-btn::before { left: 37px; transform: rotate(-45deg); transform-origin: 0 100%; }
        .heart-btn::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }

        .key-text {
            position: relative;
            z-index: 2;
            font-size: 1.6rem;
            font-weight: 700;
            color: #d63384;
            margin-top: -6px;
            user-select: none;
        }

        .heart-btn:active { transform: scale(0.9); }

        /* --- ENVELOPE (PART 2 & 3) --- */
        .envelope-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .envelope-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 2; /* Maintains strict shape dynamically across screen sizes */
            background: #ff8fa3;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            cursor: pointer;
        }

        .flap {
            position: absolute;
            top: 0; left: 0; width: 0; height: 0;
            border-left: 210px solid transparent;
            border-right: 210px solid transparent;
            border-top: 140px solid #ffb3c1;
            z-index: 4;
            transform-origin: top;
            transition: transform 0.6s ease;
        }

        .envelope-front {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ff8fa3;
            z-index: 3;
            border-radius: 0 0 15px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .letter {
            position: absolute;
            bottom: 10px; left: 10px; right: 10px;
            height: calc(100% - 20px);
            background: white;
            z-index: 2;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
            text-align: left;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
